<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PRISYX | Light. Reimagined.</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#000;
color:#fff;
font-family:'Space Grotesk',sans-serif;
overflow-x:hidden;
}

.hero{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
padding:40px;
background:
linear-gradient(rgba(0,0,0,.55),rgba(0,0,0,.75)),
radial-gradient(circle at top,#222 0%,#000 70%);
}

.content{
max-width:900px;
}

.logo{
font-size:5rem;
font-weight:700;
letter-spacing:.35em;
margin-bottom:25px;
background:linear-gradient(90deg,#ff0080,#8a2be2,#00bfff,#00ff84,#ffe600,#ff7a00,#ff0055);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.tagline{
font-size:2rem;
font-weight:300;
margin-bottom:30px;
}

.text{
font-size:1.15rem;
line-height:1.8;
max-width:700px;
margin:auto;
opacity:.85;
}

.button{
display:inline-block;
margin-top:50px;
padding:18px 40px;
border:1px solid #fff;
color:#fff;
text-decoration:none;
transition:.3s;
letter-spacing:.1em;
}

.button:hover{
background:#fff;
color:#000;
}

footer{
padding:40px;
text-align:center;
font-size:.9rem;
opacity:.5;
}

@media(max-width:700px){

.logo{
font-size:3rem;
letter-spacing:.2em;
}

.tagline{
font-size:1.3rem;
}

.text{
font-size:1rem;
}

}

</style>

</head>

<body>

<section class="hero">

<div class="content">

<div class="logo">PRISYX</div>

<div class="tagline">
Light. Reimagined.
</div>

<div class="text">
PRISYX is an independent development project exploring engineered optical surfaces that transform light into extraordinary visual experiences.
<br><br>
Prototype One is currently in development.
</div>

<a href="mailto:hello@prisyx.com" class="button">
Join the Journey
</a>

</div>

</section>

<footer>

© 2026 PRISYX

</footer>

</body>
</html>
