<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PRISYX</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
background:#050505;
color:white;
font-family:Arial,Helvetica,sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

video{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
opacity:.25;
z-index:-2;
}

.overlay{
position:fixed;
inset:0;
background:radial-gradient(circle,#00000033,#000000ee);
z-index:-1;
}

.container{
text-align:center;
max-width:900px;
padding:40px;
}

h1{
font-size:6rem;
letter-spacing:.35em;
margin-bottom:20px;
}

p{
font-size:1.5rem;
color:#ccc;
margin-bottom:50px;
}

.button{
display:inline-block;
padding:16px 38px;
border:1px solid #fff;
color:#fff;
text-decoration:none;
transition:.3s;
}

.button:hover{
background:#fff;
color:#000;
}
</style>
</head>

<body>

<video autoplay muted loop playsinline>
<source src="https://cdn.coverr.co/videos/coverr-light-particles-1562588820686?download=1080p" type="video/mp4">
</video>

<div class="overlay"></div>

<div class="container">
<h1>PRISYX</h1>
<p>Light. Reimagined.</p>

<a class="button" href="#">Coming Soon</a>

</div>

</body>
</html>
